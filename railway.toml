# Railway — single service: Colyseus + Express + static Vite client
# https://docs.railway.app/guides/config-as-code

[build]
builder = "NIXPACKS"
# Nixpacks already runs `npm ci` in the install layer. Re-running it here
# fails with EBUSY on /app/node_modules/.cache in Railway's Docker builder.
buildCommand = "npm run build"
# Monorepo path filters often ignore root-only commits; keep config in the watch set.
watchPatterns = [
  "packages/**",
  "package.json",
  "package-lock.json",
  "railway.toml",
  "nixpacks.toml",
]

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
